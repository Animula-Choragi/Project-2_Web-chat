<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Chat Sederhana</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }
    #messages {
      width: 300px;
      margin: 0 auto;
      border: 1px solid #ddd;
      padding: 10px;
      height: 200px;
      overflow-y: scroll;
    }
    #form {
      margin-top: 10px;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <h2>Login ke Web Chat</h2>
  <form action="/login" id="loginForm" method="POST">
    <input type="text" id="username" name="username" placeholder="Masukkan Nama" required />
    <button type="submit">Login</button>
  </form>

  <h3>Daftar Pengguna Online</h3>
  <ul id="usersOnline"></ul>

  <div id="chatBox" style="display: none;">
    <h2>Web Chat</h2>
    <div id="messages"></div>
    <form id="form">
      <input type="text" id="message" autocomplete="off" required />
      <button type="submit">Kirim</button>
    </form>
    <!-- localStorage hanya tersedia di browser (client-side), bukan di server -->
    <a href="/logout" onclick="localStorage.removeItem('username')">Logout</a>
  </div>
  <script>

    // Tambahan untuk sesi 10
    // Simpan username ke localStorage
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      const username = document.getElementById("username").value;
      localStorage.setItem("username", username);
    });

    // Inisialisasi koneksi socket.io
    const socket = io({
      auth: { username: localStorage.getItem("username")},
    });

    socket.on("user list", function(users) {
      document.getElementById("usersOnline").innerHTML = users.map(u => `<li>${u}</li>`).join("");
    }); 


    document.getElementById("form").addEventListener("submit", function(event){
      
      // 1. Cegah aksi default dari form (reload halaman) saat submit di klik
      event.preventDefault();

      // 2b. Ambil value message yg di input
      let message = document.getElementById("message").value; 

      // 3. Client (browser) kirim pesan ke server
      socket.emit("client send", message); 

      // 4. Value message di-set menjadi string kosong 
      document.getElementById("message").value = ""; 
    });

    // 5. Terima pesan dari server, dan jalankan fungsi
    socket.on("server send", function(message) {

      // 6. Buat elemen p/paragraph
      let item = document.createElement("p"); 
      
      // 7. Isi text content sesuai dengan isi message yang diterima
      item.textContent = message;

      // 8. Tambahkan isi item sebagai messages
      document.getElementById("messages").appendChild(item);
    });

    // 9. Kondisi tag saat username ada di localStorage
    if (localStorage.getItem("username")) {
      document.getElementById("chatBox").style.display = "block";
      // document.getElementById("loginForm").style.display = "none";
    };
  </script>
</body>
</html>
